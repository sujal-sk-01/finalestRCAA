name: sre-rca-env
version: "2.0.0"
description: >
  A production-grade simulation environment for training AI agents on
  Site Reliability Engineering (SRE) root cause analysis. Agents investigate
  realistic microservice incidents using metrics, logs, traces, and dependency
  graphs, then submit structured postmortems scored against ground truth.
  Real-world utility: directly applicable to on-call engineer training,
  automated incident response, and LLM agent evaluation for DevOps tasks.

tags:
  - openenv
  - sre
  - devops
  - root-cause-analysis
  - microservices

server:
  module: server.app:app
  port: 7860
  framework: uvicorn
  health_check: /

endpoints:
  tasks: GET /tasks
  reset: POST /reset/{difficulty}
  step: POST /step/{difficulty}
  state: GET /state/{difficulty}
  grade: POST /grader
  grader: POST /grader
  baseline: GET /baseline

tasks:
  - id: easy_rca
    name: "Single Service Failure (Easy)"
    description: >
      A checkout service has elevated error rates. One service is clearly
      degraded. Agent must identify root cause within budget.
    difficulty: easy
    max_queries: 25
    optimal_queries: 3
    success_threshold: 0.7
    grader_endpoint: POST /grader

  - id: medium_rca
    name: "Cache Stampede Cascade (Medium)"
    description: >
      A cache service failure has cascaded across multiple services. Agent must
      trace the dependency chain and identify the origin service.
    difficulty: medium
    max_queries: 30
    optimal_queries: 6
    success_threshold: 0.6
    grader_endpoint: POST /grader

  - id: hard_rca
    name: "Diffuse Network Degradation (Hard)"
    description: >
      Subtle correlated anomalies across many services with no single obvious
      failure. Requires cross-service trace analysis and dependency mapping.
      Designed to challenge frontier models.
    difficulty: hard
    max_queries: 35
    optimal_queries: 10
    success_threshold: 0.5
    grader_endpoint: POST /grader

action_space:
  type: structured_json
  schema_endpoint: GET /tasks
  actions:
    - query_metrics: "Get CPU, memory, error rate, latency for a service"
    - query_logs: "Get recent error logs for a service"
    - pull_traces: "Get distributed traces showing request flows"
    - query_dependencies: "Get upstream/downstream service dependencies"
    - form_hypothesis: "Record intermediate reasoning (no budget cost)"
    - submit_rca: "Submit final structured root cause analysis report"

observation_space:
  type: structured_json
  fields:
    - success: "bool — action succeeded"
    - message: "str — human readable result"
    - data: "dict — action-specific telemetry data"
    - anomaly_detected: "bool — anomaly signal in returned data"
    - anomaly_type: "str — type of anomaly if detected"
    - queries_remaining: "int — remaining query budget"
    - reward: "Reward — per-step reward breakdown"

reward:
  type: dense
  range: [-1.0, 1.0]
  description: "Per-step signal + terminal bonus at RCA submission"
  components:
    root_cause_relevance: "Bonus for querying root cause / affected services"
    efficiency: "Penalty for redundant queries"
    hypothesis_bonus: "Small bonus for reasoning steps"
    budget_pressure: "Increasing penalty as budget depletes"
    terminal: "Large bonus/penalty at RCA submission based on accuracy"
