openenv_version: "1.0"

name: sre-rca-env
version: "2.0.0"
description: >
  A production-grade simulation environment for training AI agents on
  Site Reliability Engineering (SRE) root cause analysis.

tags:
  - openenv
  - sre
  - devops
  - root-cause-analysis
  - microservices

server:
  module: server.app:app
  port: 7860
  framework: uvicorn
  health_check: /

endpoints:
  tasks: GET /tasks
  reset: POST /reset/{difficulty}
  step: POST /step/{difficulty}
  state: GET /state/{difficulty}
  grader: POST /grader
  baseline: GET /baseline

tasks:
  - id: easy_rca
    name: "Single Service Failure (Easy)"
    difficulty: easy
    max_queries: 25
    optimal_queries: 3
    success_threshold: 0.7
    grader_endpoint: POST /grader
  - id: medium_rca
    name: "Cache Stampede Cascade (Medium)"
    difficulty: medium
    max_queries: 30
    optimal_queries: 6
    success_threshold: 0.6
    grader_endpoint: POST /grader
  - id: hard_rca
    name: "Diffuse Network Degradation (Hard)"
    difficulty: hard
    max_queries: 35
    optimal_queries: 10
    success_threshold: 0.5
    grader_endpoint: POST /grader
  - id: ddos_rca
    name: "DDoS Attack Simulation"
    difficulty: ddos
    max_queries: 30
    optimal_queries: 5
    success_threshold: 0.6
    grader_endpoint: POST /grader

action_space:
  type: structured_json
  actions:
    - query_metrics
    - query_logs
    - pull_traces
    - query_dependencies
    - form_hypothesis
    - submit_rca

observation_space:
  type: structured_json
  fields:
    - success
    - message
    - data
    - anomaly_detected
    - anomaly_type
    - queries_remaining
    - reward

grader_weights:
  root_cause: 0.40
  causal_path: 0.25
  efficiency: 0.20
  report_quality: 0.15

baseline:
  script: inference.py
  provider: openai_compatible
  model_env_var: MODEL_NAME
  api_base_env_var: API_BASE_URL
  api_key_env_var: HF_TOKEN

notes:
  difficulty_values: [easy, medium, hard, ddos]
  hf_spaces: Set HF_TOKEN, API_BASE_URL, MODEL_NAME in Space secrets.